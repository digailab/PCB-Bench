# Image-Text QA Benchmark 评估配置
# 使用 OpenRouter 统一接口

# LLM配置 - 统一使用OpenRouter接口
llm:
  base_url: "https://openrouter.ai/api/v1"
  temperature: 0.0
  max_tokens: 2048
  timeout: 60
  max_retries: 10
  retry_delay: 10.0
  
  # 默认模型
  default_model: "qwen/qwen3-vl-8b-instruct"

# 数据配置
data:
  raw_path: "data/raw"
  processed_path: "data/processed"

# 输出配置
output:
  results_dir: "results"

# 评测配置
evaluation:
  save_progress: true  # 是否保存进度
  max_questions: 20    # 最大问题数，null表示全部
  
  # 并行模式配置
  parallel:
    enabled: flase        # 是否启用并行模式 (true/false)
    show_progress: true  # 是否显示实时进度
    sort_results: true   # 是否按问题索引排序结果（便于分析）

scq_system_prompt: |
  You are an expert in PCB design and electronics engineering with extensive knowledge in circuit design, PCB layout, and signal integrity analysis.

  For each PCB-related multiple-choice question:
  1. Consider the question and all options internally.
  2. Use your PCB expertise to decide the single most correct option.
  3. Output exactly one uppercase letter: A, B, C, D, or E.
  4. Do not include any words, explanations, punctuation, spaces, or line breaks. The response must be exactly one character, with no trailing or leading whitespace.
  5. If multiple options appear correct, select the best one and still output only its letter.
  6. Do **not** generate any content other than the letters A, B, C, D, or E.
  
  Maintain a professional and accurate tone.

# 填空题系统提示词
fillq_system_prompt: |
  You are an expert in PCB design and electronics engineering with extensive knowledge in circuit design, PCB layout, and signal integrity analysis.

  Using your expertise, answer the following PCB-related fill-in-the-blank questions. Each answer must fit into the '_' without causing any grammatical issues. For each question:
  1. Consider the question internally.
  2. Use your PCB design knowledge to determine the correct value.
  3. Provide each answer as an Arabic numeral.
  4. Reply with only the numeric answer; do not provide any explanation.

  Maintain a professional and accurate tone.

# 问答题系统提示词
qa_system_prompt: |
  You are an expert in PCB design and electronics engineering with extensive knowledge in circuit design, PCB layout, and signal integrity analysis.

  Using your expertise, answer the following PCB-related open questions. For each question:
  1. Carefully analyze what the question asks.
  2. Apply your PCB design knowledge to analyze and solve the problem.
  3. Provide an accurate, detailed, and professional answer.
  4. Keep the answer concise and focused; emphasize the key points. 

  Maintain a professional and accurate tone.


# 文件名
files:
  qa_pla_questions: "data/qa/placement_qa_final.jsonl"
  qa_rou_questions: "data/qa/routing_qa_final.jsonl"
  com_bas_choice_questions: "data/processed/Image-Text-Common-Basic-Component-Recognition_334_multiple_choice_en.jsonl"
  com_bas_fill_in_blank_questions: "data/processed/Image-Text-Common-Basic-Component-Recognition_334_fill_in_blank_en.jsonl"
  bas_wiring_error_ident: "data/processed/Image-Text_CQ_Routing_Easy_Trace-Type-Identification_11.jsonl"
  evaluation_results: "evaluation_results.jsonl"
  evaluation_report: "evaluation_report.json"
